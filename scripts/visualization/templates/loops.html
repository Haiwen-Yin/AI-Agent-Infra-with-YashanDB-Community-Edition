<div class="main-content">
  <div class="top-bar">
    <h4><span data-zh>循环管理</span><span data-en>Loop Management</span></h4>
    <button class="btn-action" onclick="showCreateLoopModal()"><span data-zh>+ 创建循环</span><span data-en>+ Create Loop</span></button>
    <button class="btn-action" style="margin-left:0" onclick="loadLoops()"><span data-zh>刷新</span><span data-en>Refresh</span></button>
  </div>
  <div class="content-area">
    <div class="split-layout">
      <div class="left-panel" id="loopListPanel">
        <div style="padding:12px 0"><span data-zh>循环列表</span><span data-en>Loop List</span></div>
        <div id="loopList"></div>
      </div>
      <div class="right-panel" id="loopDetailPanel">
        <div class="empty-state" id="detailEmpty">
          <div class="icon"><svg class="cx-nav-icon" aria-hidden="true"><use href="/static/chuanxu-icons.svg#loop"></use></svg></div>
          <p><span data-zh>选择一个循环以查看详情</span><span data-en>Select a loop to view details</span></p>
        </div>
        <div id="detailContent" style="display:none"><button class="detail-close-btn" onclick="deselectLoop()" title="Close" aria-label="Close"><svg class="cx-nav-icon"><use href="/static/chuanxu-icons.svg#close"></use></svg></button></div>
      </div>
    </div>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
  </div>

<div id="modalContainer"></div>
<script>
var allLoops=[];var selectedLoopId=null;var selectedRunId=null;var currentLoop=null;var currentRuns=[];

function toggleLang(){var h=document.documentElement;var c=h.getAttribute('data-lang');var n=c==='en'?'zh':'en';h.setAttribute('data-lang',n);localStorage.setItem('lang',n)}
function escapeHtml(s){if(s==null)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function valueLabel(value){return window.ChuanxuUI?window.ChuanxuUI.valueLabel(value):String(value==null?'':value)}
function statusBadge(s){var raw=String(s||'UNKNOWN'),cls='badge-'+raw.toLowerCase();return '<span class="badge-status '+cls+'" data-cx-value="'+escapeHtml(raw)+'" title="'+escapeHtml(raw)+'">'+escapeHtml(valueLabel(raw))+'</span>'}
function evalBadge(t){var raw=String(t||'UNKNOWN'),cls='badge-'+raw.toLowerCase();return '<span class="badge-status '+cls+'" data-cx-value="'+escapeHtml(raw)+'" title="'+escapeHtml(raw)+'">'+escapeHtml(valueLabel(raw))+'</span>'}
function fmtJson(obj){if(obj==null)return '-';try{if(typeof obj==='string'){try{return escapeHtml(JSON.stringify(JSON.parse(obj),null,2))}catch(e){return escapeHtml(obj)}}return escapeHtml(JSON.stringify(obj,null,2))}catch(e){return escapeHtml(String(obj))}}
function trunc(s,n){s=String(s||'');return s.length>n?s.substring(0,n)+'...':s}

async function loadLoops(){
  document.getElementById('loading').style.display='flex';
  try{
    var r=await fetch('/api/loops');
    if(!r.ok){if(r.status===401){window.location.href='/login';return;}throw new Error('HTTP '+r.status);}
    var d=await r.json();allLoops=d.loops||d||[];
    renderLoopList(allLoops);
  }catch(e){
    console.error(e);
    var lp=document.getElementById('loopList');
    if(lp)lp.innerHTML='<div style="text-align:center;padding:40px;color:var(--cx-brand-blue)"><span data-zh>加载循环失败：</span><span data-en>Failed to load loops: </span>'+escapeHtml(e.message||String(e))+'</div>';
  } finally {
    document.getElementById('loading').style.display='none';
  }
}

function renderLoopList(loops){
  var el=document.getElementById('loopList');
  if(!loops||!loops.length){el.innerHTML='<div class="empty-state"><div class="icon"><svg class="cx-nav-icon" aria-hidden="true"><use href="/static/chuanxu-icons.svg#loop"></use></svg></div><p><span data-zh>暂无循环</span><span data-en>No loops found</span></p></div>';return}
  var h='';
  for(var i=0;i<loops.length;i++){
    var l=loops[i];
    var sel=(l.loop_id===selectedLoopId)?' selected':'';
    h+='<div class="loop-item'+sel+'" onclick="selectLoop(\''+escapeHtml(l.loop_id)+'\')">';
    h+='<div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><span class="loop-title">'+escapeHtml(l.title||l.loop_id)+'</span>'+statusBadge(l.status||'DRAFT')+'</div>';
    h+='<div class="loop-meta"><span data-zh>迭代</span><span data-en>Iterations</span>: '+escapeHtml(String(l.iteration_count||0))+' · <span data-zh>令牌</span><span data-en>Tokens</span>: '+escapeHtml(String(l.total_tokens||0))+'</div>';
    h+='<div class="loop-meta" style="font-family:monospace">'+escapeHtml(trunc(l.loop_id,24))+'</div>';
    h+='</div>';
  }
  el.innerHTML=h;
}

async function selectLoop(loopId){
  selectedLoopId=loopId;selectedRunId=null;
  renderLoopList(allLoops);
  document.getElementById('detailEmpty').style.display='none';
  document.getElementById('detailContent').style.display='block';
  document.getElementById('detailContent').innerHTML='<button class="detail-close-btn" onclick="deselectLoop()" title="Close" aria-label="Close"><svg class="cx-nav-icon"><use href="/static/chuanxu-icons.svg#close"></use></svg></button><div class="spinner" style="margin:30px auto"></div>';
  try{
    var r=await fetch('/api/loops/'+encodeURIComponent(loopId));
    if(!r.ok)throw new Error('HTTP '+r.status);
    currentLoop=await r.json();
    renderDetail(currentLoop);
    await loadRuns(loopId);
    loadChildLoops(loopId);
  }catch(e){
    document.getElementById('detailContent').innerHTML='<p style="color:#c83c4a"><span data-zh>加载失败：</span><span data-en>Load failed: </span>'+escapeHtml(e.message)+'</p>';
  }
}

function deselectLoop(){
  selectedLoopId=null;selectedRunId=null;
  document.getElementById('detailContent').style.display='none';
  document.getElementById('detailContent').innerHTML='<button class="detail-close-btn" onclick="deselectLoop()" title="Close" aria-label="Close"><svg class="cx-nav-icon"><use href="/static/chuanxu-icons.svg#close"></use></svg></button>';
  document.getElementById('detailEmpty').style.display='block';
  document.querySelectorAll('.loop-item.selected').forEach(function(el){el.classList.remove('selected')});
}

function renderDetail(l){
  var st=l.stats||{};
  var h='';
  h+='<div class="section-card"><h6><span data-zh>循环概览</span><span data-en>Loop Overview</span></h6>';
  h+='<div class="detail-field"><div class="lbl"><span data-zh>标题</span><span data-en>Title</span></div><div class="val">'+escapeHtml(l.title||'-')+'</div></div>';
  h+='<div class="detail-field"><div class="lbl">Loop ID</div><div class="val" style="font-family:monospace">'+escapeHtml(l.loop_id||'-')+'</div></div>';
  h+='<div class="detail-field"><div class="lbl"><span data-zh>状态</span><span data-en>Status</span></div><div class="val">'+statusBadge(l.status||'-')+'</div></div>';
  if(l.visibility)h+='<div class="detail-field"><div class="lbl"><span data-zh>可见性</span><span data-en>Visibility</span></div><div class="val"><span data-cx-value="'+escapeHtml(l.visibility)+'" title="'+escapeHtml(l.visibility)+'">'+escapeHtml(valueLabel(l.visibility))+'</span></div></div>';
  if(l.agent_id)h+='<div class="detail-field"><div class="lbl"><span data-zh>智能体</span><span data-en>Agent</span></div><div class="val" style="font-family:monospace">'+escapeHtml(l.agent_id)+'</div></div>';
  if(l.workspace_id)h+='<div class="detail-field"><div class="lbl"><span data-zh>工作区</span><span data-en>Workspace</span></div><div class="val" style="font-family:monospace">'+escapeHtml(l.workspace_id)+'</div></div>';
  if(l.created_at)h+='<div class="detail-field"><div class="lbl"><span data-zh>创建时间</span><span data-en>Created</span></div><div class="val">'+escapeHtml(l.created_at)+'</div></div>';
  h+='<div class="detail-actions">';
  h+='<button class="btn-sm btn-success" onclick="startRun(\''+escapeHtml(l.loop_id)+'\')"><span data-zh>启动运行</span><span data-en>Start Run</span></button>';
  h+='<button class="btn-sm btn-info" onclick="showCreateLoopModal(\''+escapeHtml(l.loop_id)+'\')"><span data-zh>编辑</span><span data-en>Edit</span></button>';
  h+='<button class="btn-sm btn-danger" onclick="deleteLoop(\''+escapeHtml(l.loop_id)+'\')"><span data-zh>删除</span><span data-en>Delete</span></button>';
  h+='</div>';
  h+='</div>';

  h+='<div class="section-card"><h6><span data-zh>目标定义</span><span data-en>Goal Definition</span></h6><div class="json-block">'+fmtJson(l.goal_definition)+'</div></div>';
  h+='<div class="section-card"><h6><span data-zh>停止条件</span><span data-en>Stop Conditions</span></h6><div class="json-block">'+fmtJson(l.stop_conditions)+'</div></div>';
  h+='<div class="section-card"><h6><span data-zh>评估配置</span><span data-en>Evaluation Config</span></h6>';
  if(l.evaluation_config){try{var ec=typeof l.evaluation_config==='string'?JSON.parse(l.evaluation_config):l.evaluation_config;if(ec&&ec.eval_type)h+='<div style="margin-bottom:8px">'+evalBadge(ec.eval_type)+'</div>'}catch(e){}}
  h+='<div class="json-block">'+fmtJson(l.evaluation_config)+'</div></div>';
  if(l.trigger_config)h+='<div class="section-card"><h6><span data-zh>触发配置</span><span data-en>Trigger Config</span></h6><div class="json-block">'+fmtJson(l.trigger_config)+'</div></div>';

  h+='<div class="section-card"><h6><span data-zh>统计</span><span data-en>Stats</span></h6>';
  h+='<div class="stats-grid">';
  h+='<div class="stat-card"><div class="stat-value">'+escapeHtml(String(st.total_runs||l.total_runs||0))+'</div><div class="stat-label"><span data-zh>总运行</span><span data-en>Total Runs</span></div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:#00a38e">'+escapeHtml(String(st.completed||0))+'</div><div class="stat-label"><span data-zh>已完成</span><span data-en>Completed</span></div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:#c83c4a">'+escapeHtml(String(st.failed||0))+'</div><div class="stat-label"><span data-zh>失败</span><span data-en>Failed</span></div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:#1769d2">'+escapeHtml(String(st.running||0))+'</div><div class="stat-label"><span data-zh>运行中</span><span data-en>Running</span></div></div>';
  h+='<div class="stat-card"><div class="stat-value">'+escapeHtml(String(st.total_tokens||l.total_tokens||0))+'</div><div class="stat-label"><span data-zh>总令牌</span><span data-en>Total Tokens</span></div></div>';
  h+='</div></div>';

  h+='<div class="section-card"><h6><span data-zh>运行列表</span><span data-en>Runs</span></h6><div id="runsContainer"><div class="spinner" style="margin:20px auto"></div></div></div>';
  h+='<div class="section-card" id="iterationsSection" style="display:none"><h6><span data-zh>迭代时间线</span><span data-en>Iterations Timeline</span></h6><div id="iterationsContainer"></div></div>';
  h+='<div class="section-card" id="childLoopsSection"><h6><span data-zh>子循环</span><span data-en>Child Loops</span></h6><div id="childLoopsContainer"><div class="spinner" style="margin:20px auto"></div></div></div>';
  h+='<div class="section-card" id="aggregationSection" style="display:none"><h6><span data-zh>聚合结果</span><span data-en>Aggregation</span></h6><div id="aggregationContainer"></div></div>';

  document.getElementById('detailContent').innerHTML='<button class="detail-close-btn" onclick="deselectLoop()" title="Close" aria-label="Close"><svg class="cx-nav-icon"><use href="/static/chuanxu-icons.svg#close"></use></svg></button>'+h;
}
async function loadRuns(loopId){
  var c=document.getElementById('runsContainer');if(!c)return;
  c.innerHTML='<div class="spinner" style="margin:20px auto"></div>';
  try{
    var r=await fetch('/api/loops/'+encodeURIComponent(loopId)+'/runs');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();currentRuns=d.runs||d||[];
    renderRuns(currentRuns);
  }catch(e){c.innerHTML='<p style="color:#c83c4a"><span data-zh>加载运行失败：</span><span data-en>Failed to load runs: </span>'+escapeHtml(e.message)+'</p>'}
}

function renderRuns(runs){
  var c=document.getElementById('runsContainer');if(!c)return;
  if(!runs||!runs.length){c.innerHTML='<p style="color:var(--cx-text-secondary);font-size:.85rem"><span data-zh>暂无运行</span><span data-en>No runs yet</span></p>';return}
  var h='';
  for(var i=0;i<runs.length;i++){
    var rn=runs[i];
    var sel=(rn.run_id===selectedRunId)?' selected':'';
    h+='<div class="run-row'+sel+'" onclick="loadIterations(\''+escapeHtml(rn.run_id)+'\')">';
    h+='<span style="font-family:monospace;font-size:.8rem">'+escapeHtml(trunc(rn.run_id,18))+'</span>';
    h+=statusBadge(rn.status||'-');
    h+='<span style="font-size:.78rem;color:var(--cx-text-secondary)"><span data-zh>迭代</span><span data-en>Iter</span>: '+escapeHtml(String(rn.iteration_count||0))+'</span>';
    h+='<span style="font-size:.78rem;color:var(--cx-text-secondary)"><span data-zh>令牌</span><span data-en>Tokens</span>: '+escapeHtml(String(rn.total_tokens||0))+'</span>';
    h+='<span style="margin-left:auto;display:flex;gap:4px">';
    if(rn.status==='RUNNING'){h+='<button class="btn-sm btn-warn" onclick="event.stopPropagation();pauseRun(\''+escapeHtml(rn.run_id)+'\')"><span data-zh>暂停</span><span data-en>Pause</span></button>';h+='<button class="btn-sm btn-danger" onclick="event.stopPropagation();stopRun(\''+escapeHtml(rn.run_id)+'\')"><span data-zh>停止</span><span data-en>Stop</span></button>'}
    else if(rn.status==='PAUSED'){h+='<button class="btn-sm btn-success" onclick="event.stopPropagation();resumeRun(\''+escapeHtml(rn.run_id)+'\')"><span data-zh>恢复</span><span data-en>Resume</span></button>';h+='<button class="btn-sm btn-danger" onclick="event.stopPropagation();stopRun(\''+escapeHtml(rn.run_id)+'\')"><span data-zh>停止</span><span data-en>Stop</span></button>'}
    else{h+='<button class="btn-sm btn-success" onclick="event.stopPropagation();startRun(\''+escapeHtml(selectedLoopId||'')+'\')"><span data-zh>启动</span><span data-en>Start</span></button>'}
    h+='</span></div>';
  }
  c.innerHTML=h;
}

async function loadIterations(runId){
  selectedRunId=runId;
  renderRuns(currentRuns);
  var sec=document.getElementById('iterationsSection');var c=document.getElementById('iterationsContainer');
  if(sec)sec.style.display='block';
  if(c)c.innerHTML='<div class="spinner" style="margin:20px auto"></div>';
  try{
    var r=await fetch('/api/loops/runs/'+encodeURIComponent(runId)+'/iterations');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();var iters=d.iterations||d||[];
    renderIterations(iters);
  }catch(e){if(c)c.innerHTML='<p style="color:#c83c4a"><span data-zh>加载迭代失败：</span><span data-en>Failed to load iterations: </span>'+escapeHtml(e.message)+'</p>'}
}

function renderIterations(iters){
  var c=document.getElementById('iterationsContainer');if(!c)return;
  if(!iters||!iters.length){c.innerHTML='<p style="color:var(--cx-text-secondary);font-size:.85rem"><span data-zh>暂无迭代</span><span data-en>No iterations</span></p>';return}
  var h='<div class="iter-timeline">';
  for(var i=0;i<iters.length;i++){
    var it=iters[i];
    var passed=it.evaluation_passed;var cls='';var mark='';
    if(passed===true||passed==='Y'||passed===1||passed==='true'){cls=' passed';mark='PASS'}
    else if(passed===false||passed==='N'||passed===0||passed==='false'){cls=' failed';mark='FAIL'}
    h+='<div class="iter-node'+cls+'">';
    h+='<div class="iter-head"><b><span data-zh>迭代</span><span data-en>Iteration</span> #'+escapeHtml(String(it.iteration_number||it.iteration||i+1))+'</b>';
    if(mark)h+='<span style="font-size:1rem" data-cx-value="'+mark+'" title="'+mark+'">'+escapeHtml(valueLabel(mark))+'</span>';
    if(it.status)h+=statusBadge(it.status);
    h+='</div>';
    if(it.token_usage!=null)h+='<div style="font-size:.78rem;color:var(--cx-text-secondary)"><span data-zh>令牌用量</span><span data-en>Tokens</span>: '+escapeHtml(String(it.token_usage))+'</div>';
    if(it.started_at)h+='<div style="font-size:.76rem;color:var(--cx-text-secondary)"><span data-zh>开始</span><span data-en>Start</span>: '+escapeHtml(it.started_at)+(it.completed_at?(' · <span data-zh>完成</span><span data-en>End</span>: '+escapeHtml(it.completed_at)):'')+'</div>';
    if(it.evaluation_result)h+='<div style="font-size:.76rem;color:var(--cx-text-secondary);margin-top:2px"><span data-zh>评估</span><span data-en>Eval</span>: <span class="json-block" style="display:inline-block;max-height:120px;margin-top:4px">'+fmtJson(it.evaluation_result)+'</span></div>';
    h+='</div>';
  }
  h+='</div>';
  c.innerHTML=h;
}

function closeModal(){document.getElementById('modalContainer').innerHTML=''}

function showCreateLoopModal(editId){
  var l=null;
  if(editId){for(var i=0;i<allLoops.length;i++){if(allLoops[i].loop_id===editId)l=allLoops[i]}}
  var h='<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">';
  h+='<h5>'+(l?'<span data-zh>编辑循环</span><span data-en>Edit Loop</span>':'<span data-zh>创建循环</span><span data-en>Create Loop</span>')+'</h5>';
  h+='<div class="form-group"><label><span data-zh>标题 *</span><span data-en>Title *</span></label><input id="clTitle" value="'+escapeHtml(l?l.title:'')+'"></div>';
  if(!l){h+='<div class="form-group"><label><span data-zh>从规格创建</span><span data-en>Create from Spec</span></label><div style="display:flex;gap:8px"><select id="clSpecId" style="flex:1" onchange="onSpecSelected()"><option value="">-- <span data-zh>选择规格</span><span data-en>Select Spec</span> --</option></select><button type="button" class="btn-sm btn-info" onclick="createLoopFromSpec()"><span data-zh>从规格创建</span><span data-en>From Spec</span></button></div></div>';
  h+='<div class="form-group"><label><span data-zh>协作组 (可选)</span><span data-en>Collaboration Group (optional)</span></label><select id="clCollabGroup"><option value="">-- <span data-zh>无</span><span data-en>None</span> --</option></select></div>'}
  h+='<div class="form-group"><label><span data-zh>目标定义 (JSON)</span><span data-en>Goal Definition (JSON)</span></label><textarea id="clGoal" rows="4">'+escapeHtml(l?fmtJsonRaw(l.goal_definition):'')+'</textarea></div>';
  h+='<div class="form-group"><label><span data-zh>停止条件 (JSON)</span><span data-en>Stop Conditions (JSON)</span></label><textarea id="clStop" rows="4">'+escapeHtml(l?fmtJsonRaw(l.stop_conditions):'')+'</textarea></div>';
  h+='<div class="form-group"><label><span data-zh>评估类型</span><span data-en>Eval Type</span></label><select id="clEvalType"><option value="TEST" data-label-zh="测试" data-label-en="Test">'+escapeHtml(valueLabel('TEST'))+'</option><option value="DIFF" data-label-zh="差异评估" data-label-en="Diff">'+escapeHtml(valueLabel('DIFF'))+'</option><option value="LLM_JUDGE" data-label-zh="模型评判" data-label-en="LLM judge">'+escapeHtml(valueLabel('LLM_JUDGE'))+'</option><option value="MANUAL" data-label-zh="手动评估" data-label-en="Manual">'+escapeHtml(valueLabel('MANUAL'))+'</option><option value="SPEC_VALIDATION" data-label-zh="规格验证" data-label-en="Spec validation">'+escapeHtml(valueLabel('SPEC_VALIDATION'))+'</option></select></div>';
  h+='<div class="form-group"><label><span data-zh>评估配置 (JSON)</span><span data-en>Evaluation Config (JSON)</span></label><textarea id="clEval" rows="4">'+escapeHtml(l?fmtJsonRaw(l.evaluation_config):'')+'</textarea></div>';
  h+='<div class="form-group"><label><span data-zh>触发配置 (JSON, 可选)</span><span data-en>Trigger Config (JSON, optional)</span></label><textarea id="clTrigger" rows="3">'+escapeHtml(l?fmtJsonRaw(l.trigger_config):'')+'</textarea></div>';
  h+='<div class="form-group"><label><span data-zh>智能体 ID</span><span data-en>Agent ID</span></label><input id="clAgentId" value="'+escapeHtml(l?l.agent_id||'':'')+'"></div>';
  h+='<div class="form-group"><label><span data-zh>工作区 ID</span><span data-en>Workspace ID</span></label><input id="clWorkspaceId" value="'+escapeHtml(l?l.workspace_id||'':'')+'"></div>';
  h+='<div class="modal-actions"><button type="button" class="btn-secondary" onclick="closeModal()"><span data-zh>取消</span><span data-en>Cancel</span></button>';
  h+='<button type="button" class="btn-primary" onclick="createLoop('+(l?'\''+escapeHtml(l.loop_id)+'\'':'null')+')"><span data-zh>保存</span><span data-en>Save</span></button></div>';
  h+='</div></div>';
  document.getElementById('modalContainer').innerHTML=h;
  if(!l)loadModalDropdowns();
  if(l&&l.evaluation_config){try{var ec=typeof l.evaluation_config==='string'?JSON.parse(l.evaluation_config):l.evaluation_config;if(ec&&ec.eval_type){var sel=document.getElementById('clEvalType');if(sel)sel.value=ec.eval_type}}catch(e){}}
}

function fmtJsonRaw(obj){if(obj==null)return '';try{if(typeof obj==='string'){JSON.parse(obj);return obj}return JSON.stringify(obj,null,2)}catch(e){return String(obj)}}

function parseJsonField(val,fallback){if(!val||!val.trim())return fallback;try{return JSON.parse(val)}catch(e){return null}}

async function createLoop(editId){
  var title=document.getElementById('clTitle').value.trim();
  if(!title){alert('Title is required');return}
  var data={title:title};
  var goal=parseJsonField(document.getElementById('clGoal').value,document.getElementById('clGoal').value||null);
  var stop=parseJsonField(document.getElementById('clStop').value,null);
  var evalTxt=document.getElementById('clEval').value.trim();
  var evalType=document.getElementById('clEvalType').value;
  var evalCfg=evalTxt?parseJsonField(evalTxt,{eval_type:evalType}):{eval_type:evalType};
  if(!evalCfg)evalCfg={eval_type:evalType};else if(typeof evalCfg==='object'&&!evalCfg.eval_type)evalCfg.eval_type=evalType;
  var trig=parseJsonField(document.getElementById('clTrigger').value,null);
  if(goal)data.goal_definition=goal;
  if(stop)data.stop_conditions=stop;
  data.evaluation_config=evalCfg;
  if(trig)data.trigger_config=trig;
  var ag=document.getElementById('clAgentId').value.trim();if(ag)data.agent_id=ag;
  var ws=document.getElementById('clWorkspaceId').value.trim();if(ws)data.workspace_id=ws;
  var cg=document.getElementById('clCollabGroup');if(cg){var cgv=cg.value;if(cgv)data.collab_group_id=cgv}
  try{
    var url='/api/loops/create';var method='POST';
    if(editId){data.loop_id=editId}
    var r=await fetch(url,{method:method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    var d=await r.json();if(!r.ok){alert(d.error||'Create failed');return}
    closeModal();loadLoops();if(editId)selectLoop(editId);
  }catch(e){alert('Error: '+e.message)}
}

async function startRun(loopId){
  if(!loopId){alert('No loop selected');return}
  try{var r=await fetch('/api/loops/runs/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({loop_id:loopId})});var d=await r.json();if(!r.ok){alert(d.error||'Start failed');return}selectLoop(loopId)}catch(e){alert('Error: '+e.message)}
}
async function pauseRun(runId){
  try{var r=await fetch('/api/loops/runs/pause',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({run_id:runId})});var d=await r.json();if(!r.ok){alert(d.error||'Pause failed');return}if(selectedLoopId){await loadRuns(selectedLoopId)}}catch(e){alert('Error: '+e.message)}
}
async function resumeRun(runId){
  try{var r=await fetch('/api/loops/runs/resume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({run_id:runId})});var d=await r.json();if(!r.ok){alert(d.error||'Resume failed');return}if(selectedLoopId){await loadRuns(selectedLoopId)}}catch(e){alert('Error: '+e.message)}
}
async function stopRun(runId){
  if(!confirm('Stop this run?'))return;
  try{var r=await fetch('/api/loops/runs/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({run_id:runId})});var d=await r.json();if(!r.ok){alert(d.error||'Stop failed');return}if(selectedLoopId){await loadRuns(selectedLoopId)}}catch(e){alert('Error: '+e.message)}
}

async function deleteLoop(loopId){
  if(!confirm('Delete this loop? This cannot be undone.'))return;
  try{var r=await fetch('/api/loops/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({loop_id:loopId})});var d=await r.json();if(!r.ok){alert(d.error||'Delete failed');return}selectedLoopId=null;document.getElementById('detailContent').style.display='none';document.getElementById('detailEmpty').style.display='block';loadLoops()}catch(e){alert('Error: '+e.message)}
}

async function loadModalDropdowns(){
  try{var r=await fetch('/api/specs');if(r.ok){var d=await r.json();var specs=d.specs||d||[];var sel=document.getElementById('clSpecId');if(sel){for(var i=0;i<specs.length;i++){var o=document.createElement('option');o.value=String(specs[i].spec_id);o.textContent=specs[i].title||specs[i].spec_id;sel.appendChild(o)}}}}catch(e){}
  try{var r=await fetch('/api/collab');if(r.ok){var d=await r.json();var groups=d.groups||d||[];var sel=document.getElementById('clCollabGroup');if(sel){for(var i=0;i<groups.length;i++){var o=document.createElement('option');o.value=String(groups[i].group_id||groups[i].collab_group_id||'');o.textContent=groups[i].name||groups[i].group_id||groups[i].collab_group_id;sel.appendChild(o)}}}}catch(e){}
}

async function onSpecSelected(){
  var sel=document.getElementById('clSpecId');if(!sel||!sel.value)return;
  try{var r=await fetch('/api/specs/'+encodeURIComponent(sel.value));if(!r.ok)return;var spec=await r.json();
  var ti=document.getElementById('clTitle');if(ti&&!ti.value)ti.value=spec.title||'';
  var gl=document.getElementById('clGoal');if(gl&&!gl.value)gl.value=JSON.stringify(spec.goal||spec.description||{spec_id:spec.spec_id},null,2);
  }catch(e){}
}

async function createLoopFromSpec(){
  var sel=document.getElementById('clSpecId');if(!sel||!sel.value){alert('Select a spec first');return}
  var data={spec_id:sel.value};
  var cg=document.getElementById('clCollabGroup');if(cg&&cg.value)data.collab_group_id=cg.value;
  try{var r=await fetch('/api/loops/from-spec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});var d=await r.json();if(!r.ok){alert(d.error||'Create from spec failed');return}closeModal();loadLoops();if(d.loop_id)selectLoop(d.loop_id)}catch(e){alert('Error: '+e.message)}
}

async function loadChildLoops(loopId){
  var c=document.getElementById('childLoopsContainer');if(!c)return;
  try{var r=await fetch('/api/loops/'+encodeURIComponent(String(loopId))+'/children');if(!r.ok){c.innerHTML='<p style="color:var(--cx-text-secondary);font-size:.85rem"><span data-zh>暂无子循环</span><span data-en>No child loops</span></p>';return}
  var d=await r.json();var children=d.children||d||[];
  if(!children.length){c.innerHTML='<p style="color:var(--cx-text-secondary);font-size:.85rem"><span data-zh>暂无子循环</span><span data-en>No child loops</span></p>';return}
  var h='';for(var i=0;i<children.length;i++){var ch=children[i];
  h+='<div class="loop-item" onclick="selectLoop(\''+escapeHtml(String(ch.loop_id))+'\')">';
  h+='<div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><span class="loop-title">'+escapeHtml(ch.title||ch.loop_id)+'</span>'+statusBadge(ch.status||'DRAFT')+'</div>';
  h+='<div class="loop-meta"><span data-zh>迭代</span><span data-en>Iter</span>: '+escapeHtml(String(ch.iteration_count||0))+'</div>';
  if(ch.evaluation_result)h+='<div class="loop-meta" style="font-size:.72rem"><span data-zh>评估</span><span data-en>Eval</span>: '+trunc(String(ch.evaluation_result),80)+'</div>';
  h+='</div>'}
  c.innerHTML=h;
  }catch(e){c.innerHTML='<p style="color:var(--cx-text-secondary);font-size:.85rem"><span data-zh>暂无子循环</span><span data-en>No child loops</span></p>'}
  try{var r2=await fetch('/api/loops/'+encodeURIComponent(String(loopId))+'/aggregation');if(r2.ok){var agg=await r2.json();var ac=document.getElementById('aggregationContainer');var as=document.getElementById('aggregationSection');
  if(as&&agg&&Object.keys(agg).length){as.style.display='';ac.innerHTML='<div class="json-block">'+fmtJson(agg)+'</div>'}}}catch(e){}
}

(function(){var s=localStorage.getItem('lang');if(s)document.documentElement.setAttribute('data-lang',s)})();
window.addEventListener('chuanxu-language-change',function(){document.querySelectorAll('[data-cx-value]').forEach(function(el){el.textContent=valueLabel(el.getAttribute('data-cx-value'));});});
loadLoops();
var _aloSec=300,_aloInt=null;
function _aloTick(){_aloSec--;if(_aloSec<=0){window.location.href='/logout';return}
var m=Math.floor(_aloSec/60),s=_aloSec%60,el=document.getElementById('autoLogoutTimer');
if(el){el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
if(_aloSec<=60){el.classList.add('warn')}else{el.classList.remove('warn')}}
if(_aloSec<=30){document.title='['+_aloSec+'s] Session Expiring'}}
function _aloReset(){_aloSec=300;var el=document.getElementById('autoLogoutTimer');if(el)el.classList.remove('warn')}
_aloInt=setInterval(_aloTick,1000);
document.addEventListener('mousemove',_aloReset);document.addEventListener('keydown',_aloReset);document.addEventListener('click',_aloReset);document.addEventListener('visibilitychange',function(){if(!document.hidden){_aloReset();fetch('/api/session/heartbeat').catch(function(){})}});
var _hbInt=setInterval(function(){fetch('/api/session/heartbeat').catch(function(){})},120000);
document.getElementById('loopDetailPanel').addEventListener('click',function(e){
  if(e.target===this||e.target.id==='detailEmpty'||e.target.closest('#detailEmpty')){
    if(selectedLoopId)deselectLoop();
  }
});
</script>
