<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Infra - YashanDB Community - Login</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #0f3460;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b0;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --border-color: #2a2a4a;
  --input-bg: #1a1a3e;
  --input-border: #3a3a5a;
}
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-card h2 {
  text-align: center;
  margin-bottom: 8px;
  font-weight: 700;
  color: var(--accent);
}
.login-card .subtitle {
  text-align: center;
  color: var(--text-secondary);
  margin-bottom: 32px;
  font-size: 0.9rem;
}
.form-control {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  color: var(--text-primary);
  border-radius: 8px;
  padding: 12px 16px;
}
.form-control:focus {
  background: var(--input-bg);
  border-color: var(--accent);
  color: var(--text-primary);
  box-shadow: 0 0 0 2px rgba(233,69,96,0.25);
}
.form-control::placeholder {
  color: var(--text-secondary);
}
.form-label {
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.btn-login {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 12px;
  width: 100%;
  font-weight: 600;
  font-size: 1rem;
  transition: background 0.2s;
}
.btn-login:hover {
  background: var(--accent-hover);
  color: #fff;
}
.btn-login:disabled {
  background: #5a3a4a;
  color: #888;
}
.alert-danger {
  background: rgba(233,69,96,0.15);
  border: 1px solid rgba(233,69,96,0.3);
  color: #ff6b81;
  border-radius: 8px;
  font-size: 0.9rem;
}
.lang-toggle {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-toggle:hover {
  border-color: var(--accent);
  color: var(--text-primary);
}
.version-badge {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.75rem;
  margin-top: 24px;
}

</style>
</head>
<body>
<button class="lang-toggle" onclick="toggleLang()">
  <span data-zh>EN</span><span data-en>中文</span>
</button>

<div class="login-card">
  <h2><span data-zh>AI Agent Infra</span><span data-en>AI Agent Infra</span></h2>
  <p class="subtitle"><span data-zh>请输入用户名和密码登录</span><span data-en>Please enter username and password to login</span></p>

  <div id="errorMsg" class="alert alert-danger d-none"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="mb-3">
      <label class="form-label" for="username">
        <span data-zh>用户名</span><span data-en>Username</span>
      </label>
      <input type="text" class="form-control" id="username" required autocomplete="username"
        placeholder="" data-ph-zh="输入用户名" data-ph-en="Enter username">
    </div>
    <div class="mb-4">
      <label class="form-label" for="password">
        <span data-zh>密码</span><span data-en>Password</span>
      </label>
      <input type="password" class="form-control" id="password" required autocomplete="current-password"
        placeholder="" data-ph-zh="输入密码" data-ph-en="Enter password">
    </div>
    <button type="submit" class="btn btn-login" id="submitBtn">
      <span data-zh>登录</span><span data-en>Login</span>
    </button>
  </form>

  <div class="version-badge">YashanDB Community Edition v4.0.0</div>
</div>

<script>
function toggleLang() {
  const html = document.documentElement;
  const current = html.getAttribute('data-lang');
  const next = current === 'en' ? 'zh' : 'en';
  html.setAttribute('data-lang', next);
  applyLang(next);
}

function applyLang(lang) {
  document.querySelectorAll('[data-zh],[data-en]').forEach(el => {
    if (el.tagName === 'INPUT') return;
    el.style.display = '';
    const zhEl = el.querySelector('[data-zh]') || el;
    const enEl = el.querySelector('[data-en]') || el;
  });
  document.querySelectorAll('[data-zh]').forEach(el => {
    if (el.closest('[data-en]') && el !== el.closest('[data-en]')) return;
    el.style.display = lang === 'zh' ? '' : 'none';
  });
  document.querySelectorAll('[data-en]').forEach(el => {
    if (el.closest('[data-zh]') && el !== el.closest('[data-zh]')) return;
    el.style.display = lang === 'en' ? '' : 'none';
  });
  document.querySelectorAll('[data-ph-zh]').forEach(el => {
    el.placeholder = lang === 'zh' ? el.getAttribute('data-ph-zh') : el.getAttribute('data-ph-en');
  });
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errorMsg');
  btn.disabled = true;
  errBox.classList.add('d-none');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      if (data.token) {
        document.cookie = 'session=' + encodeURIComponent(data.token) + '; path=/; SameSite=Strict';
      }
      window.location.href = '/knowledge';
    } else {
      errBox.textContent = data.error || (document.documentElement.getAttribute('data-lang') === 'zh' ? '登录失败' : 'Login failed');
      errBox.classList.remove('d-none');
    }
  } catch (err) {
    errBox.textContent = document.documentElement.getAttribute('data-lang') === 'zh' ? '网络错误' : 'Network error';
    errBox.classList.remove('d-none');
  } finally {
    btn.disabled = false;
  }
}

applyLang(document.documentElement.getAttribute('data-lang') || 'en');

(function(){var sl=localStorage.getItem('lang');if(sl){document.documentElement.setAttribute('data-lang',sl);document.documentElement.lang=sl}})();
</script>
</body>
</html>
