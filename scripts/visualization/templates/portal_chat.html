<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat - AI Agent Infra</title>
<style>
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#0f3460;--bg-input:#1a1a3e;--text-primary:#e0e0e0;--text-secondary:#a0a0b0;--accent:#4fc3f7;--accent-hover:#81d4fa;--border-color:#2a2a4a;--agent-bubble:#1e3a5f;--user-bubble:#0f3460;--danger:#e57373}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);flex-shrink:0}
.top-bar .title{font-weight:600;font-size:1rem;color:var(--accent)}
.top-bar .actions{display:flex;gap:8px}
.top-bar .action-btn{background:none;border:1px solid var(--border-color);color:var(--text-secondary);border-radius:6px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:all .2s}
.top-bar .action-btn:hover{border-color:var(--accent);color:var(--accent)}
.top-bar .action-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.main-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:280px;background:var(--bg-secondary);border-right:1px solid var(--border-color);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-section{padding:16px;border-bottom:1px solid var(--border-color)}
.sidebar-section h6{color:var(--accent);font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sidebar-item{padding:6px 0;font-size:.82rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item.user-name{font-size:1rem;color:var(--text-primary);font-weight:600}
.sidebar-item.user-type{font-size:.72rem;color:var(--text-secondary)}
.new-chat-btn{width:100%;padding:10px;background:var(--accent);color:var(--bg-primary);border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:12px}
.new-chat-btn:hover{background:var(--accent-hover)}
.session-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:4px;position:relative}
.session-item:hover{background:var(--bg-card)}
.session-item.active{background:var(--bg-card);border-left:2px solid var(--accent)}
.session-item .session-name{flex:1;font-size:.82rem;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .session-meta{font-size:.7rem;color:var(--text-secondary);flex-shrink:0}
.session-item .session-actions{display:none;gap:4px;flex-shrink:0}
.session-item:hover .session-actions{display:flex}
.session-item:hover .session-meta{display:none}
.session-actions .sa-btn{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:2px 4px;font-size:.75rem;border-radius:3px}
.session-actions .sa-btn:hover{color:var(--accent)}
.session-actions .sa-btn.del:hover{color:var(--danger)}
.rename-input{background:var(--bg-input);border:1px solid var(--accent);color:var(--text-primary);border-radius:4px;padding:2px 6px;font-size:.82rem;width:100%}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn .3s}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0}
.msg.agent .avatar{background:var(--accent);color:var(--bg-primary)}
.msg.user .avatar{background:var(--bg-card);color:var(--text-primary)}
.msg .bubble{padding:10px 16px 10px 24px;border-radius:12px;font-size:.88rem;line-height:1.5;word-break:break-word}
.msg.agent .bubble{background:var(--agent-bubble);border-bottom-left-radius:4px}
.msg.user .bubble{background:var(--user-bubble);border-bottom-right-radius:4px}
.msg .bubble .time{font-size:.7rem;color:var(--text-secondary);margin-top:4px}
.restart-btn{opacity:0;transition:opacity .2s;background:rgba(233,69,96,.12);color:#e94560;border:1px solid rgba(233,69,96,.25);border-radius:4px;padding:2px 8px;font-size:.72rem;cursor:pointer;margin-left:8px}
.msg:hover .restart-btn{opacity:1}
.welcome-msg{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.welcome-msg h4{color:var(--accent);font-size:1.1rem;margin-bottom:8px}
.welcome-msg p{font-size:.85rem}
.input-area{padding:12px 20px;background:var(--bg-secondary);border-top:1px solid var(--border-color);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-primary);border-radius:10px;padding:10px 14px;font-size:.9rem;resize:none;max-height:120px;min-height:42px;font-family:inherit}
.input-row textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,195,247,.15)}
.send-btn{background:var(--accent);color:var(--bg-primary);border:none;border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0;height:42px}
.send-btn:hover{background:var(--accent-hover)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.typing-indicator{padding:4px 14px;font-size:.78rem;color:var(--text-secondary);font-style:italic}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
[data-lang="zh"] [data-en]{display:none!important}
[data-lang="en"] [data-zh]{display:none!important}


.bubble h1,.bubble h2,.bubble h3{font-size:1.05em;font-weight:700;margin:8px 0 4px;color:var(--text-primary)}
.bubble h1{font-size:1.2em;border-bottom:1px solid var(--border-color);padding-bottom:4px}
.bubble h2{font-size:1.1em}
.bubble p{margin:4px 0}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0}
.bubble li{margin:2px 0}
.bubble code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:.85em}
.bubble pre{padding:10px 16px;margin:8px 0;background:rgba(0,0,0,.35);padding:10px 14px;border-radius:6px;overflow-x:auto;margin:6px 0;font-family:monospace;font-size:.82em;line-height:1.4}
.bubble pre code{background:none;padding:0;font-size:inherit}
.bubble blockquote{border-left:3px solid var(--accent);margin:6px 0;padding:4px 12px;color:var(--text-secondary);background:rgba(79,195,247,.08);border-radius:0 4px 4px 0}
.bubble a{color:var(--accent);text-decoration:underline}
.bubble strong{color:#fff;font-weight:700}
.bubble em{font-style:italic}
.bubble hr{border:none;border-top:1px solid var(--border-color);margin:8px 0}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title">AI Agent Infra</div>
  <div class="actions">
    <button class="action-btn" onclick="window.open('/portal/login','_self')"><span data-zh>切换用户</span><span data-en>Switch User</span></button>
    <button class="action-btn danger" onclick="releaseAgent()"><span data-zh>退出</span><span data-en>Exit</span></button>
  </div>
</div>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <h6><span data-zh>用户信息</span><span data-en>User Info</span></h6>
      <div id="userInfo">-</div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
      <button class="new-chat-btn" onclick="newChat()"><span data-zh>+ 新建会话</span><span data-en>+ New Chat</span></button>
      <h6><span data-zh>会话列表</span><span data-en>Sessions</span></h6>
      <div id="sessionList" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome-msg">
        <h4><span data-zh>欢迎使用 AI Agent</span><span data-en>Welcome to AI Agent</span></h4>
        <p><span data-zh>输入消息开始与你的 Agent 对话</span><span data-en>Type a message to start chatting with your Agent</span></p>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <span data-zh>Agent 正在输入...</span><span data-en>Agent is typing...</span>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><span data-zh>发送</span><span data-en>Send</span></button>
      </div>
    </div>
  </div>
</div>

<script>
function escapeHtml(s){if(s==null)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function renderMarkdown(text){
  var escaped=escapeHtml(text);
  var out=escaped;
  // Code blocks: ```lang\ncode\n```
  out=out.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){
    return '<pre><code>'+code.replace(/\n$/,'')+'</code></pre>';
  });
  // Inline code: `code`
  out=out.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Headers
  out=out.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  out=out.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  out=out.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Bold/italic
  out=out.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  out=out.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Links
  out=out.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Horizontal rule
  out=out.replace(/^---$/gm,'<hr>');
  // Blockquote
  out=out.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Unordered lists
  out=out.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  out=out.replace(/(<li>[\s\S]*?<\/li>)/g,function(m){return '<ul>'+m+'</ul>';});
  out=out.replace(/<\/ul>\s*<ul>/g,'');
  // Ordered lists
  out=out.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // Paragraphs: double newlines become paragraph breaks
  var parts=out.split('\n\n');
  for(var i=0;i<parts.length;i++){
    var p=parts[i].trim();
    if(p&&p.indexOf('<h')!==0&&p.indexOf('<pre')!==0&&p.indexOf('<ul')!==0&&p.indexOf('<ol')!==0&&p.indexOf('<blockquote')!==0&&p.indexOf('<hr')!==0){
      parts[i]='<p>'+p.replace(/\n/g,'<br>')+'</p>';
    }
  }
  out=parts.join('');
  return out;
}

function formatTime(ts){if(!ts)return '';try{return new Date(ts).toLocaleTimeString()}catch(e){return ts}}

function loadUserInfo(){
  fetch('/portal/api/user/profile').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('userInfo');
    if(d.user_id){
      var isZh=document.documentElement.getAttribute('data-lang')==='zh';
      var typeLabel=d.auth_source==='LDAP'?(isZh?'LDAP 用户':'LDAP User'):(isZh?'系统用户':'System User');
      el.innerHTML='<div class="sidebar-item user-name">'+escapeHtml(d.username)+'</div><div class="sidebar-item user-type">'+typeLabel+'</div>';
    }
  }).catch(function(){});
}

function loadSessions(){
  fetch('/portal/api/chat/sessions').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('sessionList');
    el.innerHTML='';
    if(d.sessions&&d.sessions.length){
      d.sessions.forEach(function(s){
        var div=document.createElement('div');
        div.className='session-item'+(s.is_current?' active':'');
        div.dataset.wsId=s.workspace_id;
        div.innerHTML='<span class="session-name">'+escapeHtml(s.name||s.workspace_id)+'</span>'
          +'<span class="session-meta">'+s.msg_count+' msg</span>'
          +'<span class="session-actions">'
          +'<button class="sa-btn" onclick="event.stopPropagation();renameSession(\''+s.workspace_id+'\',\''+escapeHtml(s.name||'').replace(/'/g,"\\'")+'\')" title="Rename">&#9998;</button>'
          +'<button class="sa-btn del" onclick="event.stopPropagation();deleteSession(\''+s.workspace_id+'\',\''+escapeHtml(s.name||'').replace(/'/g,"\\'")+'\')" title="Delete">&#10005;</button>'
          +'</span>';
        div.onclick=function(){switchSession(s.workspace_id)};
        el.appendChild(div);
      });
    }else{
      el.innerHTML='<div class="sidebar-item" style="color:var(--text-secondary)"><span data-zh>暂无会话</span><span data-en>No sessions</span></div>';
    }
  }).catch(function(){});
}

function loadHistory(){
  fetch('/portal/api/chat/history').then(function(r){return r.json()}).then(function(d){
    var container=document.getElementById('messages');
    container.innerHTML='';
    if(d.messages&&d.messages.length){
      d.messages.forEach(function(m){
        appendMessage(m.role,m.content,m.timestamp,m.context_id);
      });
    }else{
      container.innerHTML='<div class="welcome-msg"><h4><span data-zh>开始新对话</span><span data-en>Start a conversation</span></h4><p><span data-zh>输入消息开始与你的 Agent 对话</span><span data-en>Type a message to start chatting with your Agent</span></p></div>';
    }
  }).catch(function(){});
  loadSessions();
}

function appendMessage(role,content,ts,messageId){
  var container=document.getElementById('messages');
  var welcome=container.querySelector('.welcome-msg');
  if(welcome)welcome.remove();
  var div=document.createElement('div');
  div.className='msg '+(role==='user'?'user':'agent');
  var avatarText=role==='user'?'U':'A';
  var restartBtn='';
  if(role==='user'&&messageId){
    var isZh=document.documentElement.getAttribute('data-lang')==='zh';
    restartBtn='<button class="restart-btn" onclick="forkFromMessage(\''+escapeHtml(messageId).replace(/'/g,"\\'")+'\')">'+(isZh?'↺ 重新开始':'↺ Restart')+'</button>';
  }
  var rendered=role==='agent'?renderMarkdown(content):escapeHtml(content);
  div.innerHTML='<div class="avatar">'+avatarText+'</div><div class="bubble">'+rendered+restartBtn+'<div class="time">'+escapeHtml(formatTime(ts))+'</div></div>';
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
  return div.querySelector('.bubble');
}

function sendMessage(){
  var input=document.getElementById('msgInput');
  var msg=input.value.trim();
  if(!msg)return;
  input.value='';
  input.style.height='auto';
  appendMessage('user',msg,new Date().toISOString());
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('typingIndicator').style.display='block';

  fetch('/portal/api/chat/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,stream:true})})
  .then(function(response){
    var contentType=response.headers.get('Content-Type')||'';
    if(contentType.indexOf('text/event-stream')>=0){
      var reader=response.body.getReader();
      var decoder=new TextDecoder();
      var agentBubble=appendMessage('agent','',new Date().toISOString());
      var fullText='';
      var buffer='';
      function finishStream(){
        document.getElementById('sendBtn').disabled=false;
        document.getElementById('typingIndicator').style.display='none';
        if(fullText)loadSessions();
      }
      function pump(){
        reader.read().then(function(result){
          if(result.done){finishStream();return;}
          buffer+=decoder.decode(result.value,{stream:true});
          var lines=buffer.split('\n');
          buffer=lines.pop();
          lines.forEach(function(line){
            if(line.startsWith('data: ')){
              try{
                var d=JSON.parse(line.substring(6));
                if(d.type==='token'){fullText+=d.content;if(agentBubble){agentBubble.innerHTML=renderMarkdown(fullText)+'<div class="time">'+escapeHtml(formatTime(new Date().toISOString()))+'</div>';var mc=document.getElementById('messages');if(mc)mc.scrollTop=mc.scrollHeight;}}
                if(d.type==='done'){finishStream();}
              }catch(e){}
            }
          });
          pump();
        }).catch(function(e){finishStream();});
      }
      pump();
    }else{
      return response.json().then(function(d){
        document.getElementById('sendBtn').disabled=false;
        document.getElementById('typingIndicator').style.display='none';
        if(d.success){
          appendMessage('agent',d.reply,d.timestamp);
          loadSessions();
        }else{
          appendMessage('agent','Error: '+(d.error||'Unknown error'),new Date().toISOString());
        }
      });
    }
  })
  .catch(function(err){
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('typingIndicator').style.display='none';
    appendMessage('agent','Connection error',new Date().toISOString());
  });
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
  var input=document.getElementById('msgInput');
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
}

function newChat(){
  fetch('/portal/api/chat/new',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      document.getElementById('messages').innerHTML='<div class="welcome-msg"><h4><span data-zh>新会话已创建</span><span data-en>New Chat Started</span></h4><p><span data-zh>输入消息开始对话</span><span data-en>Type a message to start</span></p></div>';
      document.getElementById('msgInput').focus();
      loadSessions();
    }
  }).catch(function(){});
}

function forkFromMessage(contextId){
  var isZh=document.documentElement.getAttribute('data-lang')==='zh';
  if(!confirm(isZh?'从此处开始新的探索分支？':'Start a new exploration branch from this point?'))return;
  fetch('/portal/api/chat/new',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fork_context_id:contextId})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      loadHistory();
      loadSessions();
    }
  }).catch(function(e){alert('Error: '+e.message)});
}

function switchSession(wsId){
  fetch('/portal/api/chat/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace_id:wsId})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.success){
      loadHistory();
    }else{
      console.error('Switch failed:',d.error);
      loadSessions();
    }
  }).catch(function(e){console.error('Switch error:',e);loadSessions()});
}

function renameSession(wsId,currentName){
  var newName=prompt(document.documentElement.getAttribute('data-lang')==='zh'?'输入新名称:':'Enter new name:',currentName);
  if(!newName||newName===currentName)return;
  fetch('/portal/api/chat/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace_id:wsId,name:newName})})
  .then(function(r){return r.json()})
  .then(function(d){if(d.success)loadSessions()}).catch(function(){});
}

function deleteSession(wsId,name){
  var msg=(document.documentElement.getAttribute('data-lang')==='zh'?'确定删除会话「':'Delete session "')+escapeHtml(name)+(document.documentElement.getAttribute('data-lang')==='zh'?'」？所有消息将被永久删除。':'"? All messages will be permanently deleted.');
  if(!confirm(msg))return;
  fetch('/portal/api/chat/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace_id:wsId})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.success){
      loadSessions();
      loadHistory();
    }
  }).catch(function(){});
}

function releaseAgent(){
  if(!confirm(document.documentElement.getAttribute('data-lang')==='zh'?'确定退出吗？你将返回登录页面。':'Exit? You will return to the login page.'))return;
  fetch('/portal/api/agent/release',{method:'POST'}).catch(function(){});
  document.cookie='session_id=;Path=/;Max-Age=0';
  window.location.href='/portal/login';
}

(function(){
  var saved=localStorage.getItem('lang');
  if(saved)document.documentElement.setAttribute('data-lang',saved);
  loadUserInfo();
  loadHistory();
  document.getElementById('msgInput').focus();
})();
</script>
</body>
</html>
