<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Explorer - AI Agent Infra Enterprise v3.10.2</title>
<script src="/static/vis-network.min.js"></script>
<style>
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#0f3460;--bg-sidebar:#0d1b2a;--text-primary:#e0e0e0;--text-secondary:#a0a0b0;--accent:#e94560;--border-color:#2a2a4a;--sidebar-width:220px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;padding:0;position:fixed;left:0;top:0;z-index:10}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border-color)}
.sidebar-brand h5{margin:0;color:var(--accent);font-size:.95rem;font-weight:700}
.sidebar-brand small{color:var(--text-secondary);font-size:.7rem}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;min-height:0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-secondary);text-decoration:none;font-size:.88rem;transition:all .15s;border-left:3px solid transparent}
.sidebar-nav a:hover{color:var(--text-primary);background:rgba(233,69,96,.08)}
.sidebar-nav a.active{color:var(--accent);background:rgba(233,69,96,.12);border-left-color:var(--accent)}
.sidebar-nav a .icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-nav .nav-divider{border-top:1px solid var(--border-color);margin:4px 12px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border-color);flex-shrink:0}
.lang-toggle{background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-secondary);border-radius:6px;padding:4px 12px;font-size:.78rem;cursor:pointer;width:100%;margin-bottom:6px}
.lang-toggle:hover{border-color:var(--accent)}
.logout-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:8px 12px;background:rgba(233,69,96,.12);color:var(--accent);border:1px solid rgba(233,69,96,.25);border-radius:6px;font-size:.82rem;cursor:pointer;text-decoration:none;margin-top:8px}
.logout-btn:hover{background:rgba(233,69,96,.25)}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:var(--sidebar-width)}
.top-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color)}
.top-bar h4{margin:0;font-size:1.1rem;font-weight:600}
.stats-bar{display:flex;gap:16px;margin-left:auto;font-size:.82rem;color:var(--text-secondary)}
.stats-bar span{padding:2px 10px;background:var(--bg-card);border-radius:4px}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px}
.search-row{display:flex;gap:8px}
.search-row input,.search-row select{background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);border-radius:8px;padding:8px 14px;font-size:.88rem}
.search-row input{flex:1}
.search-row button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:.88rem;cursor:pointer}
#visNetwork{flex:1;width:100%;min-height:400px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;overflow:hidden}
[data-lang="zh"] [data-en]{display:none!important}
[data-lang="en"] [data-zh]{display:none!important}
.badge-type{display:inline-block;border-radius:3px;padding:1px 6px;font-size:.75rem;color:#fff}
.detail-panel{position:absolute;top:60px;right:20px;width:320px;max-height:60vh;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:16px;z-index:10;display:none}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <h5>AI Agent Infra v3.10.2</h5>
    <small>Enterprise Edition</small>
  </div>
  <nav class="sidebar-nav">
    <a href="/knowledge"><span class="icon">&#128218;</span><span data-zh>知识</span><span data-en>Knowledge</span></a>
    <a href="/memory"><span class="icon">&#129504;</span><span data-zh>记忆</span><span data-en>Memory</span></a>
    <a href="/agents"><span class="icon">&#129302;</span><span data-zh>智能体</span><span data-en>Agents</span></a>
    <a href="/tasks"><span class="icon">&#9989;</span><span data-zh>任务</span><span data-en>Tasks</span></a>
    <a href="/workspaces"><span class="icon">&#128193;</span><span data-zh>工作区</span><span data-en>Workspaces</span></a>
    <a href="/graph" class="active"><span class="icon">&#127760;</span><span data-zh>图探索</span><span data-en>Graph Explorer</span></a>
    <a href="/specs"><span class="icon">&#128196;</span><span data-zh>规格</span><span data-en>Specs</span></a>
    <a href="/skills"><span class="icon">&#9881;</span><span data-zh>Skills</span><span data-en>Skills</span></a>
    <a href="/branches"><span class="icon">&#127793;</span><span data-zh>分支</span><span data-en>Branches</span></a>
    <a href="/collab"><span class="icon">&#128101;</span><span data-zh>协作</span><span data-en>Collab</span></a>
    <a href="/loops"><span class="icon">&#128260;</span><span data-zh>循环</span><span data-en>Loops</span></a>
    <a href="/monitor"><span class="icon">&#128202;</span><span data-zh>监控</span><span data-en>Monitor</span></a>
    <div class="nav-divider"></div>
    <a href="/approvals"><span class="icon">&#9989;</span><span data-zh>审批</span><span data-en>Approvals</span></a>
    <a href="/audit"><span class="icon">&#128736;</span><span data-zh>审计</span><span data-en>Audit</span></a>
  </nav>
  <div class="sidebar-footer">
    <button class="lang-toggle" onclick="toggleLang()">中文</button>
    <a href="/logout" class="logout-btn">&#128682; <span data-zh>登出</span><span data-en>Logout</span></a>
  </div>
</div>
<div class="main-content">
  <div class="top-bar">
    <h4><span data-zh>图谱探索器</span><span data-en>Graph Explorer</span></h4>
    <div class="stats-bar">
      <span id="vertexCount">-</span>
      <span id="edgeCount">-</span>
      <span id="avgDegree">-</span>
    </div>
  </div>
  <div class="content-area">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search entities..." onkeydown="if(event.key==='Enter')doSearch()">
      <select id="typeSelect">
        <option value="">ALL</option>
        <option value="MEMORY">MEMORY</option>
        <option value="KNOWLEDGE">KNOWLEDGE</option>
        <option value="TASK_OUTPUT">TASK_OUTPUT</option>
        <option value="EXPERIENCE">EXPERIENCE</option>
        <option value="HARNESS_TEMPLATE">HARNESS_TEMPLATE</option>
        <option value="SPEC">SPEC</option>
        <option value="SKILL">SKILL</option>
        <option value="LOOP_DEFINITION">LOOP_DEFINITION</option>
      </select>
      <button onclick="doSearch()"><span data-zh>搜索</span><span data-en>Search</span></button>
    </div>
    <div id="visNetwork"></div>
    <div class="detail-panel" id="nodeDetail">
      <h5>Node Detail <button onclick="document.getElementById('nodeDetail').style.display='none'" style="float:right;cursor:pointer;background:none;border:none;color:var(--text-secondary)">&times;</button></h5>
      <div id="nodeDetailContent"></div>
    </div>
  </div>
</div>
<script>
function toggleLang(){var h=document.documentElement;var c=h.getAttribute('data-lang');var n=c==='en'?'zh':'en';h.setAttribute('data-lang',n);localStorage.setItem('lang',n)}

var typeColors={MEMORY:'#4fc3f7',KNOWLEDGE:'#81c784',TASK_OUTPUT:'#ffb74d',EXPERIENCE:'#e57373',HARNESS_TEMPLATE:'#ba68c8',SPEC:'#ff9800',SKILL:'#26a69a',LOOP_DEFINITION:'#78909c'};
var network=null;

// Load stats
fetch('/api/graph/stats').then(function(r){return r.json()}).then(function(d){
  document.getElementById('vertexCount').textContent='Nodes: '+(d.vertex_count||0);
  document.getElementById('edgeCount').textContent='Edges: '+(d.edge_count||0);
  document.getElementById('avgDegree').textContent='Avg Degree: '+(d.avg_degree!=null?d.avg_degree.toFixed(2):'-');
}).catch(function(e){console.error('Stats:',e)});

// Load and render graph
fetch('/api/graph/all').then(function(r){return r.json()}).then(function(d){
  var nodes=new vis.DataSet();
  var edges=new vis.DataSet();
  
  var nodeList=d.nodes||[];
  var edgeList=d.edges||[];
  
  for(var i=0;i<nodeList.length;i++){
    var n=nodeList[i];
    var c=typeColors[n.entity_type]||'#666';
    nodes.add({
      id:n.id,
      label:n.label||n.title||n.id,
      color:{background:c,border:c,highlight:{background:c,border:'#fff'}},
      font:{color:'#fff',size:14},
      size:parseInt(n.size)||20,
      title:n.title||n.entity_type||''
    });
  }
  
  for(var j=0;j<edgeList.length;j++){
    var e=edgeList[j];
    edges.add({
      from:e.from,
      to:e.to,
      label:e.label||'',
      color:{color:'#666',highlight:'#4fc3f7'},
      font:{color:'#aaa',size:10},
      arrows:'to'
    });
  }
  
  var container=document.getElementById('visNetwork');
  network=new vis.Network(container,{nodes:nodes,edges:edges},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-50,springLength:100}},
    interaction:{hover:true},
    nodes:{shape:'dot',borderWidth:2},
    edges:{width:1.5,smooth:{type:'continuous'}}
  });
  
  network.on('click',function(params){
    if(params.nodes.length>0){
      var node=nodes.get(params.nodes[0]);
      var d=node&&node.title?node.title:'No details';
      document.getElementById('nodeDetailContent').innerHTML='<pre style="color:#e0e0e0;white-space:pre-wrap">'+d+'</pre>';
      document.getElementById('nodeDetail').style.display='block';
    }else{
      document.getElementById('nodeDetail').style.display='none';
    }
  });
  
}).catch(function(e){
  console.error('Graph load error:',e);
  document.getElementById('visNetwork').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary)">Failed to load graph: '+e.message+'</div>';
});

// Search
function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  var t=document.getElementById('typeSelect').value;
  var url='/api/graph/search?q='+encodeURIComponent(q);
  if(t)url+='&type='+t;
  fetch(url).then(function(r){return r.json()}).then(function(d){
    var results=d.results||d||[];
    if(results.length>0){
      // Focus on first result
      var firstId=results[0].entity_id||results[0].id;
      if(network&&firstId){
        network.focus(firstId,{scale:1.5,animation:true});
        network.selectNodes([firstId]);
      }
    }
  }).catch(function(e){console.error('Search:',e)});
}
</script>
</body>
</html>
