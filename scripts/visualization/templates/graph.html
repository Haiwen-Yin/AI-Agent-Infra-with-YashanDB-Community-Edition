<div class="main-content">
  <div class="top-bar">
    <h4><span data-zh>图谱探索器</span><span data-en>Graph Explorer</span></h4>
    <div class="stats-bar">
      <span id="vertexCount">-</span>
      <span id="edgeCount">-</span>
      <span id="avgDegree">-</span>
    </div>
  </div>
  <div class="content-area">
    <div class="search-row">
      <input type="text" id="searchInput" data-ph-zh="搜索实体..." data-ph-en="Search entities..." onkeydown="if(event.key==='Enter')doSearch()">
      <select id="typeSelect">
        <option value="" data-label-zh="所有类型" data-label-en="All types">所有类型</option>
        <option value="MEMORY" data-label-zh="记忆" data-label-en="Memory">记忆</option>
        <option value="KNOWLEDGE" data-label-zh="知识" data-label-en="Knowledge">知识</option>
        <option value="TASK_OUTPUT" data-label-zh="任务输出" data-label-en="Task output">任务输出</option>
        <option value="EXPERIENCE" data-label-zh="经验" data-label-en="Experience">经验</option>
        <option value="HARNESS_TEMPLATE" data-label-zh="模板" data-label-en="Harness template">模板</option>
        <option value="SPEC" data-label-zh="规格" data-label-en="Spec">规格</option>
        <option value="SKILL" data-label-zh="技能" data-label-en="Skill">技能</option>
        <option value="LOOP_DEFINITION" data-label-zh="循环定义" data-label-en="Loop definition">循环定义</option>
      </select>
      <button onclick="doSearch()"><span data-zh>搜索</span><span data-en>Search</span></button>
    </div>
    <div class="filter-bar" id="graphTypeFilters"><span class="filter-label"><span data-zh>显示类型</span><span data-en>Visible types</span></span><button class="filter-badge active" type="button" data-graph-type="MEMORY" data-tone="info" aria-pressed="true"><span data-zh>记忆</span><span data-en>Memory</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="KNOWLEDGE" data-tone="success" aria-pressed="true"><span data-zh>知识</span><span data-en>Knowledge</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="TASK_OUTPUT" data-tone="warning" aria-pressed="true"><span data-zh>任务输出</span><span data-en>Task output</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="EXPERIENCE" data-tone="danger" aria-pressed="true"><span data-zh>经验</span><span data-en>Experience</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="HARNESS_TEMPLATE" aria-pressed="true"><span data-zh>模板</span><span data-en>Template</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="SPEC" data-tone="warning" aria-pressed="true"><span data-zh>规格</span><span data-en>Spec</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="SKILL" data-tone="success" aria-pressed="true"><span data-zh>技能</span><span data-en>Skill</span><span class="count">0</span></button><button class="filter-badge active" type="button" data-graph-type="LOOP_DEFINITION" data-tone="muted" aria-pressed="true"><span data-zh>循环定义</span><span data-en>Loop definition</span><span class="count">0</span></button></div>
    <div id="visNetwork"></div>
    <div class="detail-panel" id="nodeDetail">
      <h5><span data-zh>节点详情</span><span data-en>Node Detail</span><button onclick="document.getElementById('nodeDetail').style.display='none'" aria-label="Close" style="float:right;cursor:pointer;background:none;border:none;color:var(--cx-text-secondary)">&times;</button></h5>
      <div id="nodeDetailContent"></div>
    </div>
  </div>
</div>
<script>
function toggleLang(){var h=document.documentElement;var c=h.getAttribute('data-lang');var n=c==='en'?'zh':'en';h.setAttribute('data-lang',n);localStorage.setItem('lang',n)}

var typeColors={MEMORY:'#1dd6f6',KNOWLEDGE:'#00a38e',TASK_OUTPUT:'#ffb74d',EXPERIENCE:'#c83c4a',HARNESS_TEMPLATE:'#ba68c8',SPEC:'#ff9800',SKILL:'#007f6f',LOOP_DEFINITION:'#78909c'};
var network=null,nodes=null,edges=null,graphSourceNodes=[],graphSourceEdges=[];
var activeGraphTypes=new Set(Object.keys(typeColors));
var graphVisibleCounts={nodes:0,edges:0};

function graphPalette(){
  var styles=getComputedStyle(document.documentElement);
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  return {
    canvas:styles.getPropertyValue('--cx-canvas').trim()||'#d3dbe4',
    labelBackground:styles.getPropertyValue('--cx-surface-strong').trim()||(dark?'#172033':'#f4f6f8'),
    text:styles.getPropertyValue('--cx-text').trim()||'#102033',
    muted:styles.getPropertyValue('--cx-text-secondary').trim()||'#465a73',
    edge:dark?'#8296b5':'#6d8096'
  };
}
function graphLabelFont(palette,size,background,foreground){
  var labelBackground=background||palette.labelBackground;
  return {color:foreground||palette.text,background:labelBackground,size:size,strokeWidth:5,strokeColor:labelBackground};
}
function nodeTextColor(background){
  var hex=String(background||'').replace('#','');
  if(hex.length!==6)return '#fff';
  var rgb=[0,2,4].map(function(i){return parseInt(hex.substring(i,i+2),16)/255;});
  rgb=rgb.map(function(v){return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);});
  var luminance=.2126*rgb[0]+.7152*rgb[1]+.0722*rgb[2];
  return luminance>.36?'#102033':'#fff';
}
function applyGraphTheme(){
  if(!network||!nodes||!edges)return;
  var palette=graphPalette();
  nodes.forEach(function(node){
    var nodeColor=node.color&&node.color.background||'#666';
    nodes.update({id:node.id,font:graphLabelFont(palette,14,nodeColor,nodeTextColor(nodeColor))});
  });
  edges.forEach(function(edge){
    edges.update({id:edge.id,color:{color:palette.edge,highlight:'#1dd6f6'},font:graphLabelFont(palette,10)});
  });
  network.setOptions({edges:{color:{color:palette.edge,highlight:'#1dd6f6'},font:graphLabelFont(palette,10)}});
}
window.addEventListener('chuanxu-theme-change',applyGraphTheme);

function updateGraphStats(nodeCount,edgeCount){
  var zh=document.documentElement.getAttribute('data-lang')==='zh',avg=nodeCount?2*edgeCount/nodeCount:0;
  graphVisibleCounts={nodes:nodeCount,edges:edgeCount};
  document.getElementById('vertexCount').textContent=(zh?'节点: ':'Nodes: ')+nodeCount;
  document.getElementById('edgeCount').textContent=(zh?'边: ':'Edges: ')+edgeCount;
  document.getElementById('avgDegree').textContent=(zh?'平均度: ':'Avg Degree: ')+avg.toFixed(2);
}
window.addEventListener('chuanxu-language-change',function(){updateGraphStats(graphVisibleCounts.nodes,graphVisibleCounts.edges);});

function graphNode(n){
  var palette=graphPalette(),c=typeColors[n.entity_type]||(n.color&&n.color.background)||'#666';
  return {id:n.id,label:n.label||n.title||n.id,color:{background:c,border:c,highlight:{background:c,border:'#fff'}},font:graphLabelFont(palette,14,c,nodeTextColor(c)),size:parseInt(n.size)||20,title:n.title||n.entity_type||'',entity_type:n.entity_type||''};
}
function graphEdge(e){var palette=graphPalette();return {id:e.id,from:e.from,to:e.to,label:e.label||'',color:{color:palette.edge,highlight:'#1dd6f6'},font:graphLabelFont(palette,10),arrows:'to'};}
function applyGraphTypeFilter(){
  if(!nodes||!edges)return;
  var visible=graphSourceNodes.filter(function(n){return !n.entity_type||activeGraphTypes.has(n.entity_type);}),ids={};
  visible.forEach(function(n){ids[n.id]=true;});
  var visibleEdges=graphSourceEdges.filter(function(e){return ids[e.from]&&ids[e.to];});
  nodes.clear();nodes.add(visible.map(graphNode));edges.clear();edges.add(visibleEdges.map(graphEdge));
  updateGraphStats(visible.length,visibleEdges.length);applyGraphTheme();
}
function updateGraphFilterCounts(){document.querySelectorAll('[data-graph-type]').forEach(function(button){var type=button.dataset.graphType,count=graphSourceNodes.filter(function(n){return n.entity_type===type;}).length,target=button.querySelector('.count');if(target)target.textContent=count;});}
document.querySelectorAll('[data-graph-type]').forEach(function(button){button.onclick=function(){var type=button.dataset.graphType;if(activeGraphTypes.has(type))activeGraphTypes.delete(type);else activeGraphTypes.add(type);var active=activeGraphTypes.has(type);button.classList.toggle('active',active);button.setAttribute('aria-pressed',active?'true':'false');applyGraphTypeFilter();};});

// Load and render graph
fetch('/api/graph/all').then(function(r){return r.json()}).then(function(d){
  nodes=new vis.DataSet();
  edges=new vis.DataSet();

  graphSourceNodes=d.nodes||[];
  graphSourceEdges=d.edges||[];
  graphSourceNodes.forEach(function(node){if(node.entity_type)activeGraphTypes.add(node.entity_type);});
  updateGraphFilterCounts();
  applyGraphTypeFilter();

  var container=document.getElementById('visNetwork');
  network=new vis.Network(container,{nodes:nodes,edges:edges},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-50,springLength:100}},
    interaction:{hover:true},
    nodes:{shape:'dot',borderWidth:2},
    edges:{width:1.5,smooth:{type:'continuous'}}
  });
  applyGraphTheme();

  network.on('click',function(params){
    if(params.nodes.length>0){
      var node=nodes.get(params.nodes[0]);
      var d=(node&&node.title)?node.title:'No details';
      document.getElementById('nodeDetailContent').innerHTML='<pre style="color:var(--cx-text);white-space:pre-wrap">'+d+'</pre>';
      document.getElementById('nodeDetail').style.display='block';
    }else{
      document.getElementById('nodeDetail').style.display='none';
    }
  });

}).catch(function(e){
  console.error('Graph load error:',e);
  document.getElementById('visNetwork').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--cx-text-secondary)">Failed to load graph: '+e.message+'</div>';
});

// Search
function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  var t=document.getElementById('typeSelect').value;
  var url='/api/graph/search?q='+encodeURIComponent(q);
  if(t)url+='&type='+encodeURIComponent(t);
  fetch(url).then(function(r){return r.json()}).then(function(d){
    var results=d.results||d||[];
    if(results.length>0){
      var firstId=results[0].entity_id||results[0].id;
      if(network&&firstId){
        network.focus(firstId,{scale:1.5,animation:true});
        network.selectNodes([firstId]);
      }
    }
  }).catch(function(e){console.error('Search:',e)});
}

(function(){var sl=localStorage.getItem('lang');if(sl){document.documentElement.setAttribute('data-lang',sl);document.documentElement.lang=sl}})();

var _aloSec=300;
function _aloTick(){_aloSec--;if(_aloSec<=0){window.location.href='/logout';return}var m=Math.floor(_aloSec/60),s=_aloSec%60,el=document.getElementById('autoLogoutTimer');if(el){el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(_aloSec<=60){el.classList.add('warn')}else{el.classList.remove('warn')}}}
function _aloReset(){_aloSec=300;var el=document.getElementById('autoLogoutTimer');if(el)el.classList.remove('warn')}
setInterval(_aloTick,1000);
document.addEventListener('mousemove',_aloReset);document.addEventListener('keydown',_aloReset);document.addEventListener('click',_aloReset);document.addEventListener('visibilitychange',function(){if(!document.hidden){_aloReset();fetch('/api/session/heartbeat').catch(function(){})}});
var _hbInt=setInterval(function(){fetch('/api/session/heartbeat').catch(function(){})},120000);
</script>
</body>
